# Main toggle and debug settings
enabled: true
debug-messages: false
metrics: true

# This config is written with 1.21.10 in mind, but is still compatible with earlier versions. Make sure to convert the values
# Event monitoring configuration
events:
  spawn:
    creature: true
    vehicle: true
    entity: true
  inspections:
    # This will recheck loaded chunks every {frequency} seconds
    enabled: true
    frequency: 60

# Entity management settings
entities:
  entity-groups:
    ANIMALS:
      - COW
      - SHEEP
      - PIG
      - CHICKEN
    MONSTERS:
      - ZOMBIE
      - SKELETON
      - CREEPER
    NPC:
      - VILLAGER
    VEHICLE:
      - MINECART
  limits:
    ANIMALS: 50
    MONSTERS: 50
    NPC: 50
    OTHER: 500
  preservation:
    named-entities: true
    raid-entities: true
  removal:
    mode: "enforce"
    # Options:
    # "enforce" - Actively clean up existing chunks (remove) AND prevent new violations
    # "enforce-kill" - Actively clean up existing chunks (kill) AND prevent new violations
    # "prevent" - Only prevent new entities/blocks from exceeding limits
    # "remove" - Instantly remove excess entities without effects
    # "kill" - Kill excess entities with death effects/drops
    armor-stand:
      drop: false
      log-warnings: true
    # This will allow players to be killed by CSL, if they reach the set limit in entities.
    # This will work with kill, remove, enforce & enforce kill. Since we can't "remove" players in those modes the players will be killed.
    kill-players: false
  ignore:
    metadata:
      - shopkeeper
    # This will only work if you have NBTAPI Installed https://modrinth.com/plugin/nbtapi
    nbt:
      - "tag"

# Spawn reason filtering
# To disable, just remove what you don't want.
spawn-reasons:
  - "BREEDING"
  - "BUILD_IRONGOLEM"
  - "BUILD_SNOWMAN"
  - "BUILD_WITHER"
  - "CHUNK_GEN"
  - "DEFAULT"
  - "DISPENSE_EGG"
  - "DROWNED"
  - "EGG"
  - "JOCKEY"
  - "LIGHTNING"
  - "MOUNT"
  - "NATURAL"
  - "NETHER_PORTAL"
  - "OCELOT_BABY"
  - "REINFORCEMENTS"
  - "SILVERFISH_BLOCK"
  - "SPAWNER"
  - "SPAWNER_EGG"
  - "TRAP"
  - "VILLAGE_DEFENSE"
  - "VILLAGE_INVASION"

# Block restrictions
blocks:
  block-groups:
    basic:
      - "STONE"
      - "DIRT"
    ores:
      - "DIAMOND_BLOCK"
      - "GOLD_BLOCK"
  limits:
    SPAWNER: 10

# World configuration
worlds:
  mode: excluded  # "excluded" or "included"
  list: []

# Player notification settings
# todo This should probably be configured, per user, with a permission to toggle.
notifications:
  enabled: false
  cooldown-seconds: 3
  method:
    title: false
    message: false
  messages:
    entities-blocked: "&7Blocked {count} {type} from spawning in your chunk."
    entities-removed: "&7Removed {count} {type} in your chunk."
    reload-complete: "&cReloaded csl config."
    max-blocks: "&6Cannot place more &4{material}&6. Max amount per chunk &2{amount}."
    max-blocks-title: "&6Cannot place more &4{material}&6."
    max-blocks-subtitle: "&6Max amount per chunk &2{amount}."
