# Main toggle and debug settings
enabled: true
debug-messages: false
metrics: true

# Event monitoring configuration
events:
  chunk:
    load: true # might not even use these since we want them to always be on. todo
    unload: true # might not even use these since we want them to always be on. todo
    surrounding-chunks-radius: 1 # Maybe not?
  spawn:
    creature: true
    vehicle: true
    entity: true
  active-inspections: true # same here, we want these to always be on. todo, the modes wont work properly without these enabled.
  inspection-frequency: 300

# Entity management settings
entities:
  limits:
    ANIMAL: 50
    MONSTER: 50
    NPC: 50
    OTHER: 500
  preservation:
    named-entities: true
    raid-entities: true
  removal:
    mode: "enforce"
    # Options:
    # "enforce" - Actively clean up existing chunks (remove) AND prevent new violations
    # "enforce-kill" - Actively clean up existing chunks (kill) AND prevent new violations
    # "prevent" - Only prevent new entities/blocks from exceeding limits
    # "remove" - Instantly remove excess entities without effects
    # "kill" - Kill excess entities with death effects/drops
    drop-armor-stand-items: false
    log-armor-stand-warnings: true
  ignore-metadata:
    - shopkeeper

# Spawn reason filtering
spawn-reasons:
  BREEDING: true
  BUILD_IRONGOLEM: true
  BUILD_SNOWMAN: true
  BUILD_WITHER: true
  CHUNK_GEN: true
  DEFAULT: true
  DISPENSE_EGG: true
  DROWNED: true
  EGG: true
  JOCKEY: true
  LIGHTNING: true
  MOUNT: true
  NATURAL: true
  NETHER_PORTAL: true
  OCELOT_BABY: true
  REINFORCEMENTS: true
  SILVERFISH_BLOCK: true
  SPAWNER: true
  SPAWNER_EGG: true
  TRAP: true
  VILLAGE_DEFENSE: true
  VILLAGE_INVASION: true

# Block restrictions
blocks:
  SPAWNER: 10

# World configuration
worlds:
  mode: excluded  # "excluded" or "included"
  list: []
  scan-ranges:
    default:
      min-y: -64
      max-y: 256
    world_nether:
      min-y: 0
      max-y: 128

# Player notification settings
notifications:
  enabled: false
  players-in-chunk: false
  method:
    title: true
    message: false
  messages:
    entities-blocked: "&7Blocked %s from spawning in your chunk."
    entities-removed: "&7Removed %s %s in your chunk."
    reload-complete: "&cReloaded csl config."
    max-blocks: "&6Cannot place more &4{material}&6. Max amount per chunk &2{amount}."
    max-blocks-title: "&6Cannot place more &4{material}&6."
    max-blocks-subtitle: "&6Max amount per chunk &2{amount}."